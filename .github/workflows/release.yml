name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          #- os: ubuntu-latest
          #  rid: linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Linux build dependencies (x64)
        if: matrix.rid == 'linux-x64'
        run: sudo apt-get update && sudo apt-get install -y clang llvm zlib1g-dev libssl-dev

      - name: Install Linux cross-compile dependencies (arm64)
        if: matrix.rid == 'linux-arm64'
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y clang llvm gcc-aarch64-linux-gnu zlib1g-dev \
            zlib1g-dev:arm64 libssl-dev:arm64 --no-install-recommends
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Publish
        run: >
          dotnet publish src/DjiActionDbMergeTool/DjiActionDbMergeTool.csproj
          -r ${{ matrix.rid }}
          -c Release
          -f net10.0

      - name: Prepare artifact metadata
        id: artifact_vars
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}"

          $publishDir = "src/DjiActionDbMergeTool/bin/Release/net10.0/${{ matrix.rid }}/publish"
          $artifactName = "DjiActionDbMergeTool-$tagVersion-${{ matrix.rid }}.zip"

          "publish_dir=$publishDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "artifact_name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Stage artifact
        shell: pwsh
        run: |
          $publishDir = "${{ steps.artifact_vars.outputs.publish_dir }}"
          $artifactPath = Join-Path $env:GITHUB_WORKSPACE "${{ steps.artifact_vars.outputs.artifact_name }}"

          Push-Location $publishDir
          try {
            $files = Get-ChildItem -File -Recurse | Where-Object { $_.Extension -ne '.pdb' } | ForEach-Object { $_.FullName.Substring($pwd.Path.Length + 1) }
            if ($files.Count -eq 0) {
              throw "No files found to package (excluding .pdb)."
            }

            Compress-Archive -Path $files -DestinationPath $artifactPath -Force
          }
          finally {
            Pop-Location
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: ${{ steps.artifact_vars.outputs.artifact_name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
