name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: DjiActionDbMergeTool-win-x64.exe
            exe: DjiActionDbMergeTool.exe
          - os: ubuntu-latest
            rid: linux-x64
            artifact: DjiActionDbMergeTool-linux-x64
            exe: DjiActionDbMergeTool
          #- os: ubuntu-latest
          #  rid: linux-arm64
          #  artifact: DjiActionDbMergeTool-linux-arm64
          #  exe: DjiActionDbMergeTool

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Linux build dependencies (x64)
        if: matrix.rid == 'linux-x64'
        run: sudo apt-get update && sudo apt-get install -y clang llvm zlib1g-dev libssl-dev

      - name: Install Linux cross-compile dependencies (arm64)
        if: matrix.rid == 'linux-arm64'
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y clang llvm gcc-aarch64-linux-gnu zlib1g-dev \
            zlib1g-dev:arm64 libssl-dev:arm64 --no-install-recommends
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Publish
        run: >
          dotnet publish src/DjiActionDbMergeTool/DjiActionDbMergeTool.csproj
          -r ${{ matrix.rid }}
          -c Release
          --self-contained

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = "src/DjiActionDbMergeTool/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.exe }}"
          Copy-Item $src "${{ matrix.artifact }}"

      - name: Stage artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          cp "src/DjiActionDbMergeTool/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.exe }}" \
             "${{ matrix.artifact }}"
          chmod +x "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
